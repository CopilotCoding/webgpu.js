<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>webgpu.js — Scene layer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #error { position: absolute; top: 0; left: 0; right: 0; font-family: monospace; color: #fff; background: #b00020; padding: 1rem; white-space: pre-wrap; }
    #legend { position: absolute; bottom: 0; left: 0; right: 0; font-family: monospace; color: #fff; background: rgba(0,0,0,0.5); padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="error" hidden></div>
  <div id="legend">Retained scene layer: Lambert buildings (Group hierarchy), additive glow spheres, a custom-shader terrain quad, a Points star field, ambient + point lights, fog — all GPU-driven via SceneRenderer.</div>
  <script type="module" src="./main.js"></script>
</body>
</html>
